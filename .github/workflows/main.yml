name: Deploy Zola site to Pages

on:
  push:
    branches: ["main"] # Or "master", depending on your default branch
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetches the theme submodule so Zola can build it
          submodules: recursive 

      - name: Build Zola Site
        # Uses the exact Docker image from your logs
        run: docker run -v ${{ github.workspace }}:/workspace -w /workspace ghcr.io/getzola/zola:v0.22.0 build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
